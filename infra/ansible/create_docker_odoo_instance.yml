---
# Playbook: create_docker_odoo_instance.yml
# Purpose:  Create a new Odoo Docker container on a pre-configured Docker host.
#           Provisions the PostgreSQL database, filestore directory, per-instance
#           odoo.conf (with dbfilter + list_db=False), and starts the container
#           with Traefik labels for automatic HTTPS routing.
#
# Extra vars (required):
#   client_name        - Slug used for container/volume naming  (e.g. acme)
#   domain             - FQDN mapped to this instance           (e.g. acme.example.com)
#   db_name            - PostgreSQL database name
#   odoo_version       - Odoo image tag                         (e.g. 17, 18)
#   postgres_password  - PostgreSQL odoo user password
#
# Extra vars (optional):
#   restart_policy     - Docker restart policy (default: unless-stopped)
#   docker_compose_dir - Compose files root    (default: /opt/odoo-docker)
#   data_dir           - Data root             (default: /data)

- name: Create Docker Odoo instance
  hosts: all
  become: true
  gather_facts: false

  vars:
    restart_policy: unless-stopped
    docker_compose_dir: /opt/odoo-docker
    data_dir: /data
    container_name: "odoo-{{ client_name }}"
    instance_compose: "{{ docker_compose_dir }}/instances/{{ client_name }}.yml"
    instance_conf: "{{ docker_compose_dir }}/instances/{{ client_name }}.conf"

  tasks:
    - name: Create filestore directory for instance
      # uid=100 gid=101 is the odoo user inside the official odoo Docker image
      file:
        path: "{{ data_dir }}/odoo/{{ client_name }}"
        state: directory
        owner: "100"
        group: "101"
        mode: "0755"

    - name: Create instances directory
      file:
        path: "{{ docker_compose_dir }}/instances"
        state: directory
        mode: "0755"

    - name: Create PostgreSQL database for instance
      shell: >
        docker exec odoo-postgres psql -U odoo -d postgres
        -c "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" |
        grep -q 1 ||
        docker exec odoo-postgres psql -U odoo -d postgres -c "CREATE DATABASE \"{{ db_name }}\";"
      register: create_db
      changed_when: "'CREATE DATABASE' in create_db.stdout"

    - name: Render per-instance odoo.conf
      template:
        src: "{{ playbook_dir }}/../docker/templates/odoo.conf.j2"
        dest: "{{ instance_conf }}"
        mode: "0644"

    - name: Render instance docker-compose file
      template:
        src: "{{ playbook_dir }}/../docker/templates/docker-compose.instance.yml.j2"
        dest: "{{ instance_compose }}"
        mode: "0644"

    - name: Initialize Odoo database schema (odoo-bin -i base --stop-after-init)
      # Runs a throw-away container (synchronously) to install the base schema
      # into the freshly created PostgreSQL database.  Must complete before the
      # real container starts so that Odoo does not 404 with
      # "ir_module_module does not exist".
      # DB init on a fresh Odoo can take 5-15 min — keep SSH connection alive.
      shell: |
        docker run --rm \
          --network odoo-network \
          -e HOST=postgres \
          -e PORT=5432 \
          -e USER=odoo \
          -e PASSWORD="{{ postgres_password }}" \
          -v /data/odoo/{{ client_name }}:/var/lib/odoo \
          -v {{ docker_compose_dir }}/instances/{{ client_name }}.conf:/etc/odoo/odoo.conf:ro \
          odoo:{{ odoo_version }} \
          odoo --config /etc/odoo/odoo.conf \
               -d {{ db_name }} \
               -i base \
               --stop-after-init \
               --no-http
      register: db_init_result
      failed_when: db_init_result.rc != 0

    - name: Show DB init output on failure
      debug:
        msg: "{{ db_init_result.stdout_lines[-30:] | default([]) + db_init_result.stderr_lines[-30:] | default([]) }}"
      when: db_init_result.rc != 0
      ignore_errors: true

    # Set a known admin user password so DafeApp can do password-less relay login
    - name: Generate Odoo admin user password
      set_fact:
        odoo_admin_user_password: "{{ lookup('password', '/tmp/.odoo_user_pw_' ~ db_name ~ ' chars=ascii_letters,digits length=24') }}"

    - name: Hash admin user password via Odoo image
      command: >
        docker run --rm odoo:{{ odoo_version }} python3 -c
        "from passlib.context import CryptContext; print(CryptContext(['pbkdf2_sha512']).hash('{{ odoo_admin_user_password }}'))"
      register: odoo_admin_user_hash
      changed_when: false

    - name: Write admin user password hash to database
      command: >
        docker exec odoo-postgres psql -U odoo -d {{ db_name }} -c
        "UPDATE res_users SET password = '{{ odoo_admin_user_hash.stdout | trim }}' WHERE login = 'admin'"

    - name: Output admin user credentials for DafeApp
      debug:
        msg: "Odoo admin user password: {{ odoo_admin_user_password }}"

    - name: Start Odoo container
      command: >
        docker compose -f {{ instance_compose }} up -d
      register: compose_result
      failed_when: compose_result.rc != 0

    - name: Wait for Odoo container to be running
      shell: >
        docker inspect --format="{{ '{{' }}.State.Status{{ '}}' }}" {{ container_name | quote }} 2>/dev/null || echo "missing"
      register: container_status
      until: container_status.stdout == "running"
      retries: 24
      delay: 5
      changed_when: false
      failed_when: false

    - name: Capture Docker diagnostics when container does not reach running state
      shell: |
        echo "docker compose ps:"
        docker compose -f {{ instance_compose | quote }} ps || true
        echo
        echo "docker ps -a:"
        docker ps -a --filter "name={{ container_name }}" || true
        echo
        echo "recent container logs:"
        docker logs --tail 120 {{ container_name | quote }} 2>&1 || true
      register: container_diagnostics
      when: container_status.stdout != "running"
      changed_when: false
      failed_when: false

    - name: Fail when Odoo container never reaches running state
      fail:
        msg: >-
          Container {{ container_name }} did not reach running state in time
          (last status: {{ container_status.stdout | default('unknown') | trim }}).
          {{ container_diagnostics.stdout | default('') | trim }}
      when: container_status.stdout != "running"

    - name: Wait for Odoo health check to pass
      # start_period is 300s — Odoo DB init on first boot takes 3-8 min.
      # Poll for up to 10 min (60 retries × 10s). ignore_errors so the
      # playbook still succeeds even if healthcheck stays in "starting".
      shell: >
        docker inspect --format="{{ '{{' }}.State.Health.Status{{ '}}' }}" {{ container_name | quote }} 2>/dev/null || echo "missing"
      register: health_status
      until: health_status.stdout in ["healthy", "starting", ""]
      retries: 60
      delay: 10
      ignore_errors: true
      changed_when: false
