---
# ---------------------------------------------------------------------------
# Ansible Playbook: delete_odoo_instance_direct.yml
#
# Cleanly removes a direct-IP Odoo instance:
#   1. Stop + disable systemd service
#   2. Remove service unit file + config file
#   3. Drop PostgreSQL database
#   4. Close UFW port
#
# Extra vars passed by DafeApp tasks.py:
#   db_name    - database name (also used to derive service/config names)
#   http_port  - port to close in UFW
# ---------------------------------------------------------------------------
- name: Delete Odoo instance (direct IP)
  hosts: all
  become: true

  vars:
    db_name:      "{{ db_name }}"
    http_port:    "{{ (http_port | default(8069)) | int }}"
    service_name: "odoo-{{ db_name }}"
    config_file:  "/etc/odoo-{{ db_name }}.conf"

  tasks:
    - name: Stop and disable Odoo instance service
      systemd:
        name: "{{ service_name }}"
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove systemd service file
      file:
        path: "/etc/systemd/system/{{ service_name }}.service"
        state: absent

    - name: Reload systemd after removing service
      systemd:
        daemon_reload: true

    - name: Remove Odoo instance config file
      file:
        path: "{{ config_file }}"
        state: absent

    - name: Drop PostgreSQL database
      become_user: postgres
      shell: |
        psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 \
          && dropdb {{ db_name }} || true
      args:
        executable: /bin/bash

    - name: Close instance port in UFW
      ufw:
        rule: allow
        port: "{{ http_port }}"
        proto: tcp
        delete: true
      ignore_errors: true

    - name: Deletion summary
      debug:
        msg:
          - "Instance {{ db_name }} removed."
          - "Service {{ service_name }} stopped and deleted."
          - "Database {{ db_name }} dropped."
          - "Port {{ http_port }} closed."
