---
# ---------------------------------------------------------------------------
# Ansible Playbook: setup_odoo_server_bare.yml
#
# Prepares an Odoo environment directly on an Ubuntu 22.04/24.04 server (bare-metal / no Docker)
# by uploading the version-specific odoo_install.sh from scripts/installscript/{ver}/
#
# Script layout:
#   scripts/installscript/17/odoo_install.sh    ← Odoo 17
#   scripts/installscript/18/odoo_install.sh    ← Odoo 18
#   scripts/installscript/19/odoo_install.sh    ← Odoo 19
#
# Called by DafeApp via:
#   ANSIBLE_ODOO_SERVER_PLAYBOOK=.../setup_odoo_server_bare.yml
#
# Extra vars passed by DafeApp tasks.py:
#   odoo_version  - major version number only: "17", "18", or "19"
#   server_name   - server label (informational)
#   dns_domain    - FQDN if SSL is wanted; empty string disables nginx+ssl
#
# Optional extra vars (override defaults):
#   odoo_port     - Standalone Odoo HTTP port (default: 8069, legacy opt-in)
#   admin_email   - Let's Encrypt / certbot email (required when ssl=true)
#   is_enterprise - "True" / "False"  (default: False)
#   ssh_user      - remote user (default: ubuntu)
#   bootstrap_standalone - "True" / "False" (default: False)
# ---------------------------------------------------------------------------
- name: Prepare Odoo environment (bare-metal) using odoo_install.sh
  hosts: all
  become: true

  vars:
    # --- DafeApp-supplied vars (tasks.py passes these) -------------------
    odoo_version_value:   "{{ odoo_version   | default('19') }}"
    dns_domain_value:     "{{ dns_domain     | default('') }}"
    bootstrap_standalone_value: "{{ bootstrap_standalone | default('False') }}"

    # --- Derived nginx / SSL flags ----------------------------------------
    # Nginx/SSL are only relevant in standalone mode.
    # In normal DafeApp operation Traefik handles port 80/443 and Let's Encrypt,
    # so nginx must NOT be installed — otherwise it conflicts with Traefik.
    install_nginx:  "{{ 'True' if (bootstrap_standalone_value == 'True' and dns_domain_value | length > 0) else 'False' }}"
    # SSL is enabled when a domain AND a real admin email are supplied.
    enable_ssl:     "{{ 'True' if (bootstrap_standalone_value == 'True' and dns_domain_value | length > 0 and admin_email_value is defined and admin_email_value != 'odoo@example.com') else 'False' }}"
    website_name:   "{{ dns_domain_value if dns_domain_value | length > 0 else '_' }}"

    # --- Configurable overrides ------------------------------------------
    odoo_port_value:      "{{ odoo_port      | default('8069') }}"
    admin_email_value:    "{{ admin_email    | default('odoo@example.com') }}"
    is_enterprise_value:  "{{ is_enterprise  | default('False') }}"

    # --- Script paths -------------------------------------------------------
    # Each Odoo version has its own installer under scripts/installscript/{ver}/
    # Layout: scripts/installscript/17/odoo_install.sh (v17)
    #         scripts/installscript/18/odoo_install.sh (v18)
    #         scripts/installscript/19/odoo_install.sh (v19)
    remote_script_dir:   "/opt/dafeapp-install"
    install_script_name: "odoo_install.sh"
    install_script_src: >-
      {{
        playbook_dir ~ '/../../scripts/installscript/' ~ odoo_version_value ~ '/odoo_install.sh'
      }}

  tasks:
    # ------------------------------------------------------------------
    # 1. Sanity-check: only Ubuntu 22.04 / 24.04 supported
    # ------------------------------------------------------------------
    - name: Check OS family
      assert:
        that: ansible_os_family == "Debian"
        fail_msg: "This playbook requires Ubuntu (Debian family). Got: {{ ansible_os_family }}"

    - name: Check OS version
      assert:
        that: ansible_distribution_version in ["22.04", "24.04"]
        fail_msg: >
          odoo_install.sh targets Ubuntu 22.04 or 24.04.
          Detected: {{ ansible_distribution }} {{ ansible_distribution_version }}

    # ------------------------------------------------------------------
    # 2. Ensure the remote staging directory exists
    # ------------------------------------------------------------------
    - name: Create remote install staging directory
      file:
        path: "{{ remote_script_dir }}"
        state: directory
        mode: "0755"

    # ------------------------------------------------------------------
    # 3. Upload odoo_install.sh from the version folder
    # ------------------------------------------------------------------
    - name: Upload odoo_install.sh to server
      copy:
        src: "{{ install_script_src }}"
        dest: "{{ remote_script_dir }}/{{ install_script_name }}"
        mode: "0755"

    # ------------------------------------------------------------------
    # 4. Patch configurable variables inside the uploaded script
    #    (the script stores config as shell vars at the top of the file)
    # ------------------------------------------------------------------
    - name: Set OE_VERSION
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^OE_VERSION="[^"]*"'
        replace: 'OE_VERSION="{{ odoo_version_value }}.0"'

    - name: Set OE_PORT
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^OE_PORT="[^"]*"'
        replace: 'OE_PORT="{{ odoo_port_value }}"'

    - name: Set INSTALL_NGINX
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^INSTALL_NGINX="[^"]*"'
        replace: 'INSTALL_NGINX="{{ install_nginx }}"'

    - name: Set ENABLE_SSL
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^ENABLE_SSL="[^"]*"'
        replace: 'ENABLE_SSL="{{ enable_ssl }}"'

    - name: Set ADMIN_EMAIL
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^ADMIN_EMAIL="[^"]*"'
        replace: 'ADMIN_EMAIL="{{ admin_email_value }}"'

    - name: Set WEBSITE_NAME
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^WEBSITE_NAME="[^"]*"'
        replace: 'WEBSITE_NAME="{{ website_name }}"'

    - name: Set IS_ENTERPRISE
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^IS_ENTERPRISE="[^"]*"'
        replace: 'IS_ENTERPRISE="{{ is_enterprise_value }}"'

    - name: Set BOOTSTRAP_STANDALONE
      replace:
        path: "{{ remote_script_dir }}/{{ install_script_name }}"
        regexp: '^BOOTSTRAP_STANDALONE="[^"]*"'
        replace: 'BOOTSTRAP_STANDALONE="{{ bootstrap_standalone_value }}"'

    # ------------------------------------------------------------------
    # 5. Run the installer
    #    async=3600 → wait up to 1 hour (git clone + pip can be slow)
    #    poll=30    → check every 30 seconds
    # ------------------------------------------------------------------
    - name: Execute Odoo installer (this takes 5-15 minutes)
      command: "bash {{ remote_script_dir }}/{{ install_script_name }}"
      async: 3600
      poll: 30
      register: install_result

    - name: Show installer output (stdout)
      debug:
        msg: "{{ install_result.stdout_lines[-30:] }}"
      when: install_result.stdout_lines is defined

    # ------------------------------------------------------------------
    # 6. Capture the generated admin password from the Odoo config file
    #    only when standalone mode is explicitly enabled.
    # ------------------------------------------------------------------
    - name: Read Odoo config (to capture generated admin password)
      slurp:
        src: "/etc/odoo-server.conf"
      register: odoo_conf_raw
      ignore_errors: true
      when: bootstrap_standalone_value == 'True'

    - name: Extract admin_passwd from config
      set_fact:
        odoo_admin_passwd: >-
          {{ (odoo_conf_raw.content | b64decode)
             | regex_search('admin_passwd = (.+)', '\\1')
             | first | default('(could not read)') }}
      when:
        - bootstrap_standalone_value == 'True'
        - odoo_conf_raw is succeeded

    # ------------------------------------------------------------------
    # 7. Allow Odoo port through UFW (if UFW is active)
    #    only when standalone mode is explicitly enabled.
    # ------------------------------------------------------------------
    - name: Allow Odoo port in UFW
      ufw:
        rule: allow
        port: "{{ odoo_port_value }}"
        proto: tcp
      ignore_errors: true
      when: bootstrap_standalone_value == 'True'

    - name: Install DafeApp heartbeat agent
      import_tasks: "{{ playbook_dir }}/tasks/install_dafeapp_heartbeat_agent.yml"

    # ------------------------------------------------------------------
    # 8. Summary
    # ------------------------------------------------------------------
    - name: Installation summary (standalone)
      debug:
        msg:
          - "=========================================="
          - "Odoo {{ odoo_version_value }} installed (bare-metal)"
          - "Port          : {{ odoo_port_value }}"
          - "Nginx         : {{ install_nginx }}"
          - "SSL           : {{ enable_ssl }}"
          - "Domain        : {{ website_name }}"
          - "Service       : sudo service odoo-server start|stop|restart"
          - "Config file   : /etc/odoo-server.conf"
          - "Log file      : /var/log/odoo/odoo-server.log"
          - "Admin password: {{ odoo_admin_passwd | default('check /etc/odoo-server.conf') }}"
          - "=========================================="
      when: bootstrap_standalone_value == 'True'

    - name: Installation summary (environment only)
      debug:
        msg:
          - "=========================================="
          - "Odoo {{ odoo_version_value }} environment ready (bare-metal)"
          - "Server prepared for instance creation only"
          - "Source code   : /odoo/odoo-server"
          - "Python venv   : /odoo/venv"
          - "Log directory : /var/log/odoo"
          - "Next step     : create an Odoo instance with Ansible"
          - "=========================================="
      when: bootstrap_standalone_value != 'True'
