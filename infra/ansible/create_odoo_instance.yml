---
- name: Create or update one Odoo instance on a versioned server
  hosts: all
  become: true
  vars:
    odoo_version: "{{ odoo_version | default('18') }}"
    odoo_user: "odoo{{ odoo_version }}"
    odoo_home: "/opt/odoo{{ odoo_version }}"
    instance_name: "{{ instance_name | default('instance') }}"
    db_name: "{{ db_name | default('odoo_db') }}"
    domain: "{{ domain | default('') }}"
    http_port: "{{ (http_port | default(8069)) | int }}"
    service_name: "odoo-{{ db_name }}"
    nginx_site_name: "odoo-{{ db_name }}.conf"
    config_path: "{{ odoo_home }}/instances/{{ db_name }}/odoo.conf"
    admin_passwd: "{{ lookup('password', '/tmp/.odoo_admin_' ~ db_name ~ ' chars=ascii_letters,digits length=24') }}"
    letsencrypt_email: "{{ letsencrypt_email | default('admin@localhost') }}"

  tasks:
    - name: Ensure PostgreSQL service is enabled and running
      systemd:
        name: postgresql
        enabled: true
        state: started

    - name: Inspect PostgreSQL clusters
      command: pg_lsclusters --no-header
      register: pg_clusters
      changed_when: false
      failed_when: false

    - name: Detect installed PostgreSQL major version
      shell: "ls -1 /usr/lib/postgresql 2>/dev/null | sort -V | tail -n 1"
      register: pg_major_version
      changed_when: false
      failed_when: pg_major_version.stdout | trim == ""

    - name: Create a default PostgreSQL cluster if none exists
      command: "pg_createcluster {{ pg_major_version.stdout | trim }} main --start"
      when: pg_clusters.stdout_lines | length == 0

    - name: Reinspect PostgreSQL clusters after bootstrap
      command: pg_lsclusters --no-header
      register: pg_clusters
      changed_when: false
      failed_when: false

    - name: Ensure instance directory exists
      file:
        path: "{{ odoo_home }}/instances/{{ db_name }}"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0755"

    - name: Ensure log directory exists
      file:
        path: "{{ odoo_home }}/logs/{{ db_name }}"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0755"

    - name: Start any PostgreSQL clusters that are not online
      command: "pg_ctlcluster {{ item[0] }} {{ item[1] }} start"
      loop: "{{ pg_clusters.stdout_lines | map('split') | list }}"
      when:
        - item | length >= 4
        - item[3] != 'online'
      changed_when: true

    - block:
        - name: Wait for PostgreSQL to become ready
          command: pg_isready -q
          register: pg_ready
          retries: 12
          delay: 5
          until: pg_ready.rc == 0
          changed_when: false
          failed_when: pg_ready.rc != 0

        - name: Ensure PostgreSQL role exists for the instance owner
          become_user: postgres
          shell: "psql -tAc \"SELECT 1 FROM pg_roles WHERE rolname='{{ odoo_user }}'\" | grep -q 1 || createuser -s {{ odoo_user }}"
          args:
            executable: /bin/bash

        - name: Ensure PostgreSQL database exists
          become_user: postgres
          shell: "psql -tAc \"SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'\" | grep -q 1 || createdb {{ db_name }}"
          args:
            executable: /bin/bash
      rescue:
        - name: Collect PostgreSQL cluster status
          command: pg_lsclusters
          register: pg_cluster_status
          changed_when: false
          failed_when: false

        - name: Collect PostgreSQL service status
          command: systemctl status postgresql --no-pager -l
          register: pg_service_status
          changed_when: false
          failed_when: false

        - name: Show PostgreSQL diagnostics
          debug:
            msg:
              - "PostgreSQL was not ready for instance creation."
              - "{{ pg_cluster_status.stdout_lines | default([]) }}"
              - "{{ pg_service_status.stdout_lines | default([]) }}"

        - name: Fail with a clearer PostgreSQL readiness error
          fail:
            msg: "PostgreSQL not ready on {{ inventory_hostname }}; database creation aborted."

    - name: Render instance Odoo config
      template:
        src: templates/odoo-instance.conf.j2
        dest: "{{ config_path }}"
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0640"

    - name: Check whether Odoo schema is already initialized
      become_user: postgres
      shell: |
        psql -d "{{ db_name }}" -tAc "SELECT to_regclass('public.ir_module_module')"
      args:
        executable: /bin/bash
      register: odoo_schema_check
      changed_when: false
      failed_when: false

    - name: Bootstrap Odoo base schema on a fresh database
      become_user: "{{ odoo_user }}"
      command: >
        "{{ odoo_home }}/venv/bin/python3" "{{ odoo_home }}/src/odoo/odoo-bin"
        -c "{{ config_path }}"
        -d "{{ db_name }}"
        -i base
        --stop-after-init
      when: odoo_schema_check.stdout | trim != 'ir_module_module'

    - name: Render systemd service
      template:
        src: templates/odoo-instance.service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Enable and start Odoo instance service
      systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started

    - name: Render nginx site config
      template:
        src: templates/nginx-odoo-site.conf.j2
        dest: "/etc/nginx/sites-available/{{ nginx_site_name }}"
        owner: root
        group: root
        mode: "0644"

    - name: Enable nginx site
      file:
        src: "/etc/nginx/sites-available/{{ nginx_site_name }}"
        dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}"
        state: link

    - name: Disable default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Validate nginx config
      command: nginx -t

    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Request SSL certificate (optional, when domain is set)
      command: >
        certbot --nginx -d {{ domain }}
        --non-interactive --agree-tos
        --email {{ letsencrypt_email }}
        --redirect
      when: domain | length > 0
      register: certbot_out
      failed_when: false
      changed_when: "'Certificate not yet due for renewal' not in certbot_out.stdout"

    - name: Instance summary
      debug:
        msg:
          - "Service: {{ service_name }}"
          - "DB: {{ db_name }}"
          - "Port: {{ http_port }}"
          - "Domain: {{ domain if domain else 'not set' }}"
