---
# ---------------------------------------------------------------------------
# Ansible Playbook: create_odoo_instance_direct.yml
#
# Creates a new Odoo instance with a fully isolated environment:
#   - Dedicated Python virtualenv  (/odoo/instances/{db_name}/venv/)
#   - Own copy of core addons      (/odoo/instances/{db_name}/addons/core/)
#   - Own custom addons directory  (/odoo/instances/{db_name}/addons/custom/)
#   - Separate data directory      (/odoo/instances/{db_name}/data/)
#   - Separate log directory       (/odoo/instances/{db_name}/logs/)
#   - Separate PostgreSQL database
#   - Separate config:             /etc/odoo-{db_name}.conf
#   - Separate systemd service:    odoo-{db_name}.service
#   - db_filter locked to this instance only
#   - Access via:                  http://<server-ip>:{http_port}
#
# Extra vars passed by DafeApp tasks.py:
#   odoo_version   - major version: "17", "18", or "19"
#   db_name        - PostgreSQL database name (unique on this server)
#   instance_name  - human-readable label
#   http_port      - TCP port for this instance (e.g. 8069, 8070, ...)
# ---------------------------------------------------------------------------
- name: Create Odoo instance (isolated Python + addons environment)
  hosts: all
  become: true

  vars:
    odoo_version:  "{{ odoo_version  | default('19') }}"
    db_name:       "{{ db_name       | default('odoo_db') }}"
    instance_name: "{{ instance_name | default('instance') }}"
    http_port:     "{{ (http_port    | default(8069)) | int }}"
    proxy_mode:    "{{ proxy_mode    | default(false) }}"

    # Shared Odoo installation (source + binary, created by odoo_install.sh)
    odoo_user:       "odoo"
    odoo_home:       "/odoo"
    odoo_bin:        "/odoo/odoo-server/odoo-bin"
    shared_src:      "/odoo/odoo-server"
    shared_addons:   "/odoo/odoo-server/addons"
    requirements:    "/odoo/odoo-server/requirements.txt"

    # Per-instance isolated directories
    instance_dir:    "/odoo/instances/{{ db_name }}"
    venv_dir:        "/odoo/instances/{{ db_name }}/venv"
    core_addons_dir: "/odoo/instances/{{ db_name }}/addons/core"
    custom_addons_dir: "/odoo/instances/{{ db_name }}/addons/custom"
    data_dir:        "/odoo/instances/{{ db_name }}/data"
    log_dir:         "/odoo/instances/{{ db_name }}/logs"
    access_host:     "{{ ansible_host | default(ansible_default_ipv4.address | default('127.0.0.1')) }}"

    config_file:  "/etc/odoo-{{ db_name }}.conf"
    service_name: "odoo-{{ db_name }}"

    admin_passwd: "{{ lookup('password', '/tmp/.odoo_pw_' ~ db_name ~ ' chars=ascii_letters,digits length=20') }}"

  tasks:
    # ------------------------------------------------------------------
    # 0. Ensure PostgreSQL is running before any database operations
    # ------------------------------------------------------------------
    - name: Ensure PostgreSQL service is enabled and running
      systemd:
        name: postgresql
        enabled: true
        state: started

    - name: Inspect PostgreSQL clusters
      command: pg_lsclusters --no-header
      register: pg_clusters
      changed_when: false
      failed_when: false

    - name: Detect installed PostgreSQL major version
      shell: "ls -1 /usr/lib/postgresql 2>/dev/null | sort -V | tail -n 1"
      register: pg_major_version
      changed_when: false
      failed_when: pg_major_version.stdout | trim == ""

    - name: Create a default PostgreSQL cluster if none exists
      command: "pg_createcluster {{ pg_major_version.stdout | trim }} main --start"
      when: pg_clusters.stdout_lines | length == 0

    - name: Reinspect PostgreSQL clusters after bootstrap
      command: pg_lsclusters --no-header
      register: pg_clusters
      changed_when: false
      failed_when: false

    - name: Start any PostgreSQL clusters that are not online
      command: "pg_ctlcluster {{ item[0] }} {{ item[1] }} start"
      loop: "{{ pg_clusters.stdout_lines | map('split') | list }}"
      when:
        - item | length >= 4
        - item[3] != 'online'
      changed_when: true

    # ------------------------------------------------------------------
    # 1. Create isolated per-instance directory tree
    # ------------------------------------------------------------------
    - name: Create instance base directory
      file:
        path: "{{ instance_dir }}"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0750"

    - name: Create instance addons parent directory
      file:
        path: "{{ instance_dir }}/addons"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0755"

    - name: Create instance custom addons directory
      file:
        path: "{{ custom_addons_dir }}"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0755"

    - name: Create instance data directory (filestore, sessions)
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0750"

    - name: Create instance log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0755"

    # ------------------------------------------------------------------
    # 2. Copy core addons (isolated copy — changes here don't affect
    #    other instances or the shared source)
    # ------------------------------------------------------------------
    - name: Copy core Odoo addons into instance directory
      shell: |
        rsync -a --delete "{{ shared_addons }}/" "{{ core_addons_dir }}/"
        chown -R {{ odoo_user }}:{{ odoo_user }} "{{ core_addons_dir }}"
      args:
        executable: /bin/bash
        creates: "{{ core_addons_dir }}/base"

    # ------------------------------------------------------------------
    # 3. Create dedicated Python virtualenv
    # ------------------------------------------------------------------
    - name: Create Python virtualenv for instance
      become_user: "{{ odoo_user }}"
      command: python3 -m venv "{{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/python"

    - name: Upgrade pip and wheel in instance venv
      become_user: "{{ odoo_user }}"
      pip:
        name:
          - pip
          - wheel
          - setuptools
        state: latest
        virtualenv: "{{ venv_dir }}"

    - name: Install Odoo Python requirements into instance venv
      become_user: "{{ odoo_user }}"
      pip:
        requirements: "{{ requirements }}"
        virtualenv: "{{ venv_dir }}"
        extra_args: "--quiet"

    - name: Install extra Odoo packages into instance venv
      become_user: "{{ odoo_user }}"
      pip:
        name:
          - phonenumbers
          - psycopg2-binary
        virtualenv: "{{ venv_dir }}"

    # ------------------------------------------------------------------
    # 4. Verify PostgreSQL is ready, then create the database
    # ------------------------------------------------------------------
    - block:
        - name: Wait for PostgreSQL to become ready
          command: pg_isready -q
          register: pg_ready
          retries: 12
          delay: 5
          until: pg_ready.rc == 0
          changed_when: false
          failed_when: pg_ready.rc != 0

        - name: Ensure PostgreSQL role exists for the instance owner
          become_user: postgres
          shell: |
            psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ odoo_user }}'" | grep -q 1 \
              || createuser -s {{ odoo_user }}
          args:
            executable: /bin/bash

        - name: Create PostgreSQL database for instance
          become_user: postgres
          shell: |
            psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 \
              || createdb -O {{ odoo_user }} {{ db_name }}
          args:
            executable: /bin/bash
      rescue:
        - name: Collect PostgreSQL cluster status
          command: pg_lsclusters
          register: pg_cluster_status
          changed_when: false
          failed_when: false

        - name: Collect PostgreSQL service status
          command: systemctl status postgresql --no-pager -l
          register: pg_service_status
          changed_when: false
          failed_when: false

        - name: Show PostgreSQL diagnostics
          debug:
            msg:
              - "PostgreSQL was not ready for instance creation."
              - "{{ pg_cluster_status.stdout_lines | default([]) }}"
              - "{{ pg_service_status.stdout_lines | default([]) }}"

        - name: Fail with a clearer PostgreSQL readiness error
          fail:
            msg: "PostgreSQL not ready on {{ inventory_hostname }}; database creation aborted."

    # ------------------------------------------------------------------
    # 5. Render Odoo config file
    # ------------------------------------------------------------------
    - name: Render Odoo instance config
      template:
        src: templates/odoo-instance-direct.conf.j2
        dest: "{{ config_file }}"
        owner: "{{ odoo_user }}"
        group: "{{ odoo_user }}"
        mode: "0640"

    - name: Check whether Odoo schema is already initialized
      become_user: postgres
      shell: |
        psql -d "{{ db_name }}" -tAc "SELECT to_regclass('public.ir_module_module')"
      args:
        executable: /bin/bash
      register: odoo_schema_check
      changed_when: false
      failed_when: false

    - name: Bootstrap Odoo base schema on a fresh database
      become_user: "{{ odoo_user }}"
      command: >
        "{{ venv_dir }}/bin/python" "{{ odoo_bin }}"
        -c "{{ config_file }}"
        -d "{{ db_name }}"
        -i base
        --stop-after-init
      when: odoo_schema_check.stdout | trim != 'ir_module_module'

    # ------------------------------------------------------------------
    # 5b. Set Odoo admin user login password (captured by DafeApp)
    # ------------------------------------------------------------------
    - name: Generate Odoo admin user password
      set_fact:
        odoo_admin_user_password: "{{ lookup('password', '/tmp/.odoo_user_pw_' ~ db_name ~ ' chars=ascii_letters,digits length=24') }}"

    - name: Hash admin user password with passlib
      become_user: "{{ odoo_user }}"
      shell: |
        "{{ venv_dir }}/bin/python3" -c "
        from passlib.context import CryptContext
        ctx = CryptContext(schemes=['pbkdf2_sha512'], deprecated='auto')
        print(ctx.hash('{{ odoo_admin_user_password }}'))
        "
      register: odoo_admin_user_hash
      changed_when: false

    - name: Write admin user password hash to database
      become_user: postgres
      command: >
        psql -d {{ db_name }} -c
        "UPDATE res_users SET password = '{{ odoo_admin_user_hash.stdout | trim }}' WHERE login = 'admin'"

    - name: Output admin user credentials for DafeApp
      debug:
        msg: "Odoo admin user password: {{ odoo_admin_user_password }}"

    # ------------------------------------------------------------------
    # 6. Render systemd service unit
    # ------------------------------------------------------------------
    - name: Render systemd service file
      template:
        src: templates/odoo-instance-direct.service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: "0644"

    # ------------------------------------------------------------------
    # 7. Reload systemd and start the service
    # ------------------------------------------------------------------
    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start Odoo instance service
      systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started

    # ------------------------------------------------------------------
    # 8. Open the instance port in UFW
    # ------------------------------------------------------------------
    - name: Allow instance port through UFW
      ufw:
        rule: allow
        port: "{{ http_port }}"
        proto: tcp
      ignore_errors: true

    # ------------------------------------------------------------------
    # 9. Summary
    # ------------------------------------------------------------------
    - name: Instance creation summary
      debug:
        msg:
          - "================================================"
          - "Odoo instance created (fully isolated)"
          - "Service      : {{ service_name }}"
          - "Database     : {{ db_name }}"
          - "Port         : {{ http_port }}"
          - "Python venv  : {{ venv_dir }}"
          - "Core addons  : {{ core_addons_dir }}"
          - "Custom addons: {{ custom_addons_dir }}"
          - "Data dir     : {{ data_dir }}"
          - "Logs         : {{ log_dir }}/{{ db_name }}.log"
          - "Config       : {{ config_file }}"
          - "Access       : http://{{ access_host }}:{{ http_port }}"
          - "================================================"
