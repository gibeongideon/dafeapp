---
# Playbook: setup_docker_host.yml
# Purpose:  Bootstrap a server for Docker-based multi-instance Odoo.
#           Installs Docker CE, creates the odoo-network, deploys Traefik
#           and a shared PostgreSQL container, and prepares data directories.
#
# Extra vars (required):
#   acme_email         - Let's Encrypt email for Traefik
#   postgres_password  - Shared PostgreSQL password for the odoo user
#
# Extra vars (optional):
#   docker_compose_dir - Path on server to store compose files (default: /opt/odoo-docker)
#   data_dir           - Root data path (default: /data)
#   backup_dir         - Backup root (default: /backups)

- name: Bootstrap Docker host for multi-instance Odoo
  hosts: all
  become: true
  gather_facts: true

  vars:
    docker_compose_dir: /opt/odoo-docker
    data_dir: /data
    backup_dir: /backups
    acme_email: "{{ acme_email | default('odoo@example.com') }}"
    postgres_password: "{{ postgres_password }}"

  tasks:
    - name: Stop unattended-upgrades and wait for apt locks to clear
      shell: |
        systemctl stop unattended-upgrades 2>/dev/null || true
        systemctl disable unattended-upgrades 2>/dev/null || true
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
          echo "Waiting for apt lock…"
          sleep 5
        done
      args:
        executable: /bin/bash
      changed_when: false
      timeout: 300

    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: true
        upgrade: dist
      register: apt_upgrade
      retries: 5
      delay: 10
      until: apt_upgrade is succeeded

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present
        update_cache: true
      register: apt_prereqs
      retries: 5
      delay: 10
      until: apt_prereqs is succeeded

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      register: apt_docker
      retries: 5
      delay: 10
      until: apt_docker is succeeded

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Create data directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ data_dir }}/postgres"
        - "{{ data_dir }}/odoo"
        - "{{ backup_dir }}"

    - name: Create docker compose directory structure
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ docker_compose_dir }}"
        - "{{ docker_compose_dir }}/traefik"
        - "{{ docker_compose_dir }}/instances"
        - "{{ docker_compose_dir }}/letsencrypt"

    - name: Copy Traefik static config
      copy:
        src: "{{ playbook_dir }}/../docker/traefik/traefik.yml"
        dest: "{{ docker_compose_dir }}/traefik/traefik.yml"
        mode: "0644"

    - name: Create acme.json for Let's Encrypt certificates
      file:
        path: "{{ docker_compose_dir }}/letsencrypt/acme.json"
        state: touch
        mode: "0600"

    - name: Copy base docker-compose file
      copy:
        src: "{{ playbook_dir }}/../docker/docker-compose.base.yml"
        dest: "{{ docker_compose_dir }}/docker-compose.base.yml"
        mode: "0644"

    - name: Create .env file for base stack
      copy:
        dest: "{{ docker_compose_dir }}/.env"
        mode: "0600"
        content: |
          ACME_EMAIL={{ acme_email }}
          POSTGRES_PASSWORD={{ postgres_password }}
          CF_DNS_API_TOKEN={{ cf_dns_api_token | default('') }}
          TRAEFIK_BASE_DOMAIN={{ traefik_base_domain | default('') }}

    - name: Remove unlabelled odoo-network if it exists (idempotency fix)
      # A pre-existing network without compose labels causes `docker compose up` to fail.
      # Remove it only when no containers are connected — compose will recreate it correctly.
      shell: |
        if docker network inspect odoo-network >/dev/null 2>&1; then
          CONTAINERS=$(docker network inspect odoo-network --format '{{ "{{" }}len .Containers{{ "}}" }}')
          if [ "$CONTAINERS" = "0" ]; then
            docker network rm odoo-network
          fi
        fi
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Start base stack (Traefik + PostgreSQL)
      # docker-compose.base.yml owns the odoo-network definition; it creates it on first up.
      command: >
        docker compose
        -f {{ docker_compose_dir }}/docker-compose.base.yml
        --env-file {{ docker_compose_dir }}/.env
        up -d --remove-orphans
      args:
        chdir: "{{ docker_compose_dir }}"

    - name: Wait for PostgreSQL to be healthy
      command: >
        docker inspect --format="{{ '{{' }}.State.Health.Status{{ '}}' }}" odoo-postgres
      register: pg_health
      until: pg_health.stdout == "healthy"
      retries: 12
      delay: 5

    - name: Open firewall ports (UFW)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"
        - "8069:8100"
      ignore_errors: true
