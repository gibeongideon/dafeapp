version: "3.9"

# Base stack: Traefik reverse proxy + shared PostgreSQL
# Deploy once per server.  Each Odoo instance gets its own compose file.
#
# Usage:
#   ACME_EMAIL=admin@example.com POSTGRES_PASSWORD=secret docker compose -f docker-compose.base.yml up -d

networks:
  odoo-network:
    name: odoo-network
    driver: bridge

volumes:
  postgres_data:
    driver: local
  letsencrypt:
    driver: local

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/odoo-docker/traefik/traefik.yml:/traefik.yml:ro
      - letsencrypt:/letsencrypt
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-odoo@example.com}
    networks:
      - odoo-network
    labels:
      - "traefik.enable=false"

  postgres:
    image: postgres:16-alpine
    container_name: odoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    networks:
      odoo-network:
        aliases:
          - postgres
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"
