{% if messages %}
  <div class="space-y-2 mb-4" x-data>
    {% for msg in messages %}
      <div x-data="{ show: true }" x-show="show" x-transition
           class="flex items-center justify-between px-4 py-3 rounded-lg text-sm font-medium
           {% if msg.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
           {% elif msg.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
           {% elif msg.tags == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
           {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
        <span>{{ msg }}</span>
        <button @click="show = false" class="ml-4 opacity-60 hover:opacity-100">&times;</button>
      </div>
    {% endfor %}
  </div>
{% endif %}
