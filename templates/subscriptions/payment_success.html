{% extends "base.html" %}

{% block title %}Payment Successful{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="max-w-md w-full">

    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center">
        <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-8 text-center">
      <h1 class="text-xl font-semibold text-gray-900 mb-2">Payment successful</h1>
      <p class="text-gray-500 text-sm mb-6">
        Your subscription is now active. You have full access to all features included in your plan.
      </p>
      <a href="{% url 'core:dashboard' %}"
         class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-gray-900 text-white text-sm font-medium hover:bg-gray-700 transition-colors">
        Go to dashboard
      </a>
      <div class="mt-4">
        <a href="{% url 'subscriptions:billing' %}" class="text-sm text-gray-500 hover:text-gray-700 underline">
          View billing details
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
