{% extends "base.html" %}

{% block title %}Create Organization{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <span class="text-4xl">🏢</span>
      <h1 class="text-2xl font-bold text-white mt-2">Create Organization</h1>
      <p class="text-slate-400 text-sm mt-1">You'll be the Super Admin</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-6">
          <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">
            Organization Name
          </label>
          {{ form.name }}
          {% if form.name.errors %}
            <p class="mt-1 text-sm text-red-600">{{ form.name.errors.0 }}</p>
          {% endif %}
        </div>

        <button type="submit"
          class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition">
          Create Organization
        </button>
      </form>
    </div>

    <div class="text-center mt-4">
      <a href="{% url 'organizations:select' %}" class="text-slate-400 text-sm hover:text-white">
        ← Back
      </a>
    </div>
  </div>
</div>
{% endblock %}
