{% extends "base.html" %}

{% block title %}Accept Invitation{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="text-4xl mb-3">✉️</div>
        <h1 class="text-xl font-bold text-gray-900">You're Invited!</h1>
        <p class="text-gray-500 text-sm mt-1">
          Join <strong>{{ invite.organization.name }}</strong> as
          <strong>{{ invite.role|lower|title }}</strong>
        </p>
      </div>

      {% include "components/messages.html" %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" name="first_name" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" name="last_name" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email (pre-filled)</label>
          <input type="email" value="{{ invite.email }}" disabled
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Create Password</label>
          <input type="password" name="password" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" name="password_confirm" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition text-sm">
          Accept &amp; Join {{ invite.organization.name }}
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
