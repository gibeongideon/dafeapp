{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">

      <div class="text-5xl mb-4">✅</div>
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Password updated</h1>
      <p class="text-gray-500 text-sm mb-6">
        Your password has been changed successfully. You can now sign in with your new password.
      </p>

      <a href="{% url 'users:login' %}"
         class="inline-block w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold
                rounded-lg transition text-sm">
        Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
