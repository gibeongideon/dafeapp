name: Deploy — Build & Push → DigitalOcean

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # gibeongideon/dafeapp

jobs:
  # ── 1. Build Docker image and push to GHCR ──────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ghcr.io/${{ github.repository }}:main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:main
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to DigitalOcean Droplet ───────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          set -euo pipefail

          [ -n "${DO_HOST}" ] || { echo "::error::Missing GitHub secret DO_HOST"; exit 1; }
          [ -n "${DO_USER}" ] || { echo "::error::Missing GitHub secret DO_USER"; exit 1; }
          [ -n "${DO_SSH_KEY}" ] || { echo "::error::Missing GitHub secret DO_SSH_KEY"; exit 1; }

          case "${DO_SSH_KEY}" in
            *"BEGIN OPENSSH PRIVATE KEY"*|*"BEGIN RSA PRIVATE KEY"*|*"BEGIN EC PRIVATE KEY"*|*"BEGIN PRIVATE KEY"*)
              ;;
            *)
              echo "::error::DO_SSH_KEY is set, but it does not look like a private SSH key."
              exit 1
              ;;
          esac

      - name: Copy bootstrap script to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "scripts/droplet-setup.sh"
          target: "/tmp/dafeapp-bootstrap/"

      - name: Bootstrap droplet if needed
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              echo "Docker and Docker Compose are already installed."
              exit 0
            fi

            echo "Docker or Docker Compose is missing. Running one-time droplet bootstrap..."
            bash /tmp/dafeapp-bootstrap/scripts/droplet-setup.sh

            echo "Bootstrap complete. Edit /opt/dafeapp/.env before the first successful deploy."

      - name: Copy compose + Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: "/opt/dafeapp/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ghcr.io/${{ env.IMAGE_NAME }}:main
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USERNAME: ${{ github.actor }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: IMAGE,GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on this droplet."
              echo "Run: ssh root@${{ secrets.DO_HOST }} \"bash -s\" < scripts/droplet-setup.sh"
              exit 1
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo "Docker Compose plugin is not available on this droplet."
              echo "Run: ssh root@${{ secrets.DO_HOST }} \"bash -s\" < scripts/droplet-setup.sh"
              exit 1
            fi

            cd /opt/dafeapp

            if [ ! -f .env ]; then
              echo "Missing /opt/dafeapp/.env."
              echo "Run the bootstrap script, then fill in /opt/dafeapp/.env."
              exit 1
            fi

            if grep -Eq "CHANGE_ME|YOUR_DROPLET_IP_OR_DOMAIN|your-secret-key-here|your-fernet-key-here" .env; then
              echo "/opt/dafeapp/.env still contains placeholder values."
              echo "Placeholder variables still present:"
              grep -En "CHANGE_ME|YOUR_DROPLET_IP_OR_DOMAIN|your-secret-key-here|your-fernet-key-here" .env \
                | sed -E 's/^([0-9]+):([^=]+)=.*/  line \1: \2/' || true
              echo "SSH into the server and replace placeholders before deploying:"
              echo "  ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}"
              echo "  nano /opt/dafeapp/.env"
              exit 1
            fi

            echo "==> Authenticating with GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            echo "==> Pulling image: $IMAGE"
            IMAGE="$IMAGE" docker compose -f docker-compose.prod.yml pull

            echo "==> Starting services..."
            IMAGE="$IMAGE" docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Waiting 25s for containers to stabilise..."
            sleep 25

            echo "==> Container status:"
            docker compose -f docker-compose.prod.yml ps

            echo "==> Pruning unused images..."
            docker image prune -f

            echo "==> Deploy complete. App at https://dafeapp.com"
