name: Deploy — Build & Push → DigitalOcean

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # gibeongideon/dafeapp

jobs:
  # ── 1. Build Docker image and push to GHCR ──────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ghcr.io/${{ github.repository }}:dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to DigitalOcean Droplet ───────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean (157.245.108.155)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          [ -n "${DO_HOST}" ] || { echo "::error::Missing GitHub secret DO_HOST"; exit 1; }
          [ -n "${DO_USER}" ] || { echo "::error::Missing GitHub secret DO_USER"; exit 1; }
          [ -n "${GHCR_TOKEN}" ] || { echo "::error::Missing GitHub secret GHCR_TOKEN"; exit 1; }
          [ -n "${DO_SSH_KEY}" ] || { echo "::error::Missing GitHub secret DO_SSH_KEY"; exit 1; }

          case "${DO_SSH_KEY}" in
            *"BEGIN OPENSSH PRIVATE KEY"*|*"BEGIN RSA PRIVATE KEY"*|*"BEGIN EC PRIVATE KEY"*|*"BEGIN PRIVATE KEY"*)
              ;;
            *)
              echo "::error::DO_SSH_KEY is set, but it does not look like a private SSH key."
              exit 1
              ;;
          esac

      - name: Copy compose + Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: "/opt/dafeapp/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ghcr.io/${{ env.IMAGE_NAME }}:dev
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: IMAGE,GHCR_TOKEN,GH_ACTOR
          script: |
            set -e
            cd /opt/dafeapp

            echo "==> Authenticating with GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "==> Pulling image: $IMAGE"
            IMAGE="$IMAGE" docker compose -f docker-compose.prod.yml pull

            echo "==> Starting services..."
            IMAGE="$IMAGE" docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Waiting 25s for containers to stabilise..."
            sleep 25

            echo "==> Container status:"
            docker compose -f docker-compose.prod.yml ps

            echo "==> Pruning unused images..."
            docker image prune -f

            echo "==> Deploy complete. App at https://dafeapp.com"
